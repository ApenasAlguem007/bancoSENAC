<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Banco SENAC</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="container">
        <section id="registro-section">
            <h2>Novo Cliente</h2>
            <form id="form-registro">
                <input type="text" id="reg-nome" placeholder="Nome Completo">
                <input type="email" id="reg-email" placeholder="E-mail (ex: joao@senac.com)">
                <input type="password" id="reg-senha" placeholder="Senha (mín. 6 caracteres)">
                <input type="number" id="reg-saldo" placeholder="Saldo Inicial (R$)" min="0" step="0.01">
                <input type="text" id="reg-cpf" placeholder="CPF (11 dígitos)">
                <input type="text" id="reg-endereco" placeholder="Endereço">
                <input type="text" id="reg-complemento" placeholder="Complemento">
                <input type="text" id="reg-cep" placeholder="CEP (ex: 03123-000)">
                <input type="text" id="reg-cidade" placeholder="Cidade">
                <input type="text" id="reg-estado" placeholder="Estado (ex: SP)">
                <input type="text" id="reg-celular" placeholder="Celular (ex: 11 98654-0974)">

                <button type="submit" id="btn-registrar">Registrar Cliente</button>
            </form>
        </section>
    </div>
    <script src="script.js"></script>
</body>

</html>
